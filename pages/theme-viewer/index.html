<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON & TXT 뷰어 - 도구 모음</title>
    <link rel="stylesheet" href="../../codemirror/lib/codemirror.css">
    <link rel="stylesheet" href="../../codemirror-colorpicker/dist/codemirror-colorpicker.css">
    <script src="../../codemirror/lib/codemirror.js"></script>
    <script src="../../codemirror/addon/mode/simple.js"></script>
    <script src="../../codemirror/mode/xml/xml.js"></script>
    <script src="../../codemirror/addon/search/searchcursor.js"></script>
    <script src="../../codemirror/mode/css/css.js"></script>
    <script src="../../codemirror/mode/javascript/javascript.js"></script>
    <script src="../../codemirror/mode/htmlmixed/htmlmixed.js"></script>
    <script src="../../codemirror/mode/handlebars/handlebars.js"></script>
    <script src="../../codemirror/handlebars.min.js"></script>
    <script src="../../codemirror-colorpicker/dist/codemirror-colorpicker.min.js"></script>
    <!-- 공통 스타일 -->
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/navbar.css">
    <link rel="stylesheet" href="../../css/main.css">
    <!-- 개별 스타일 -->
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">
    <!-- 네비게이션 바 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="dropdown">
                <button class="dropdown-btn" id="currentPageTitle">JSON & TXT 뷰어<span class="arrow">▼</span></button>
                <div class="dropdown-content">
                    <!-- JS에서 동적으로 생성됨 -->
                </div>
            </div>

            <div class="nav-actions">
                <button id="globalThemeToggle" class="icon-btn" title="전체 테마 전환">🌙</button>
                <button id="helpBtn" class="icon-btn" title="도움말">?</button>
            </div>
        </div>
    </nav>

    <main id="app">


    <div class="editor-container">
        <!-- 파일 선택 섹션 -->
        <div class="editor-section">
            <h3 class="section-title">📁 파일 선택</h3>
            <input type="file" id="fileInput" accept=".json,.txt" class="file-input">
        </div>

        <!-- 색상 편집기 -->
        <div id="colorEditorWrapper" style="display: none;">
            <div class="editor-section">
                <h3 class="section-title clickable" onclick="toggleColorEditor()">
                    🎨 색상 편집기 <span id="colorToggleIcon">[펼치기]</span>
                </h3>
                <div id="colorEditorSection" style="display: none;">
                    <div id="colorGrid" class="color-grid"></div>
                    <div class="color-actions">
                        <button class="btn btn-secondary btn-sm" onclick="themeEditor.resetColors()">원래대로</button>
                        <button class="btn btn-paste btn-sm" onclick="themeEditor.pasteColors()">📋 붙여넣기</button>
                        <button class="btn btn-copy btn-sm" onclick="themeEditor.copyAllColors()">📄 복사</button>
                    </div>
                </div>
            </div>
        </div>
                <!-- 찾기/바꾸기 섹션 -->
        <div class="editor-section">
            <h3 class="section-title clickable" onclick="toggleSearchSection()">
                <div>🔍 찾기 / 바꾸기 <span id="searchCounter"></span></div> <span id="searchToggleIcon">[펼치기]</span>
            </h3>
            <div id="searchSectionContent" style="display: none;">
                <div class="search-group">
                    <input type="text" id="searchInput" class="search-input" placeholder="검색어 입력...">
                    <div class="search-buttons">
                        <button class="btn btn-primary" onclick="themeEditor.searchPrev()">이전</button>
                        <button class="btn btn-primary" onclick="themeEditor.searchNext()">다음</button>
                        
                        <button id="toggleReplaceBtn" class="btn btn-toggle" onclick="toggleReplaceBox()">바꾸기</button>
                    </div>
                    
                </div>
                
                <div id="replaceBox" class="replace-box">
                    <div class="search-group">
                        <input type="text" id="replaceInput" class="search-input" placeholder="바꿀 내용...">
                        <div class="search-buttons">
                            <button class="btn btn-secondary" onclick="themeEditor.replaceOne()">하나만</button>
                            <button class="btn btn-secondary" onclick="themeEditor.replaceAll()">모두 바꾸기</button>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
        <!-- CSS 편집기 -->
        <div class="editor-section">
            <h3 class="section-title">
                ✏️ CSS 편집기
                <div class="editor-title-buttons">
                    <button class="btn btn-icon" onclick="themeEditor.copyAllCSS()">📄 복사</button>
                    <button class="btn btn-success" onclick="themeEditor.downloadJSON()">💾 다운로드</button>
                </div>
            </h3>
            <div class="editor-main">
                <div class="editor-wrapper">
                    <textarea id="cssEditor"></textarea>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="expand-btn" type="button" onclick="expandEditor('theme-viewer')">+ 칸 늘리기</button>
                <button class="expand-btn" type="button" onclick="resetEditor('theme-viewer')" style="background: #fff0f0; border-color: #ffcccc; color: #e74c3c;">↺ 원래대로</button>
            </div>
        </div>
    </div>

    <!-- 붙여넣기 모달 -->
    <div id="pasteModal" class="paste-modal">
        <div class="paste-modal-content">
            <div class="paste-modal-header">
                <h3>색상 붙여넣기</h3>
                <button class="paste-close-btn" onclick="themeEditor.closePasteModal()">×</button>
            </div>
            <div class="paste-modal-body">
                <p class="paste-help">양식에 맞춰 내용을 넣으면 자동으로 입력 됩니다:</p>
                <div class="paste-example">주요 텍스트: #333333<br>그림자 색상: #000000 (A: 0.29)<br><br>또는<br><br>주요 텍스트 333333<br>그림자 색상 000000 A 0.29</div>
                <textarea id="pasteTextarea" class="paste-textarea" placeholder="예시:&#10;주요 텍스트: #000000&#10;이탤릭체 텍스트: #000000&#10;밑줄 텍스트: #000000&#10;인용 텍스트: #000000&#10;UI 배경: #FFFFFF&#10;채팅 배경: #FFFFFF (A: 0)&#10;사용자 메시지 흐림 틴트: #FFFFFF (A: 0.5)&#10;AI 메시지 흐림 틴트: #FFFFFF (A: 0.1)&#10;그림자 색상: #000000&#10;UI 테두리: #000000"></textarea>
            </div>
            <div class="paste-modal-footer">
                <button class="btn btn-secondary" onclick="themeEditor.closePasteModal()">취소</button>
                <button class="btn btn-success" onclick="themeEditor.applyPastedColors()">적용</button>
            </div>
        </div>
    </div>
    </main>



    <!-- 공통 스크립트 -->
    <script src="../../js/theme.js"></script>
    <script src="../../js/navbar.js"></script>
    <!-- 개별 스크립트 -->
    <script src="script.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof initApp === 'function') {
                initApp();
            }
        });
    </script>
</body>
</html>
